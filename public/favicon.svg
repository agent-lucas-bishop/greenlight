  <polygon points="22,14 30,14 22,28" fill="#1a1a2e"/>
  <polygon points="34,14 42,14 34,28" fill="#1a1a2e"/>
  <polygon points="46,14 54,14 46,28" fill="#1a1a2e"/>
  <!-- Hinge circle -->
