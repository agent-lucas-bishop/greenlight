  <!-- Text lines on board -->
  <rect x="10" y="32" width="30" height="3" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="10" y="39" width="44" height="3" rx="1" fill="#22c55e" opacity="0.4"/>
  <rect x="10" y="46" width="36" height="3" rx="1" fill="#22c55e" opacity="0.3"/>
